<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANGUARD: STABLE BUILD</title>
    <style>
        body { margin: 0; background: #050a10; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #counter { font-size: 50px; color: #00d2ff; text-shadow: 0 0 15px #00d2ff; }
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; color: white; transform: translateY(-50%); }
        .btn { pointer-events: auto; padding: 20px 50px; font-size: 24px; background: #00d2ff; border: none; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui"><div id="counter">1</div></div>
    <div id="msg" id="startMenu">
        <h1>VANGUARD SURGE</h1>
        <button class="btn" onclick="initGame()">START GAME</button>
    </div>
    <canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');
const counterEl = document.getElementById('counter');
const menu = document.getElementById('msg');

let w, h, playerX, targetX = 0, count = 1, running = false;
let objects = [], particles = [], frame = 0;

function initGame() {
    running = true;
    count = 1;
    objects = [];
    menu.style.display = 'none';
}

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    playerX = targetX = w / 2;
}

window.addEventListener('mousemove', e => targetX = e.clientX);
window.addEventListener('touchmove', e => targetX = e.touches[0].clientX);
window.addEventListener('resize', resize);
resize();

function spawn() {
    if (frame % 80 === 0) {
        const isMult = Math.random() > 0.5;
        objects.push({
            x: Math.random() * (w - 150),
            y: -100,
            type: isMult ? 'x' : '+',
            val: isMult ? Math.floor(Math.random() * 2) + 2 : Math.floor(Math.random() * 20) + 5,
            color: isMult ? '#00d2ff' : '#00ff88'
        });
    }
}

function drawPlayer(x, y, count) {
    // Draw the "Crowd" swarm
    const size = 15 + Math.log10(count) * 8;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00d2ff';
    ctx.fillStyle = '#00d2ff';
    
    // Core
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
    
    // Orbiting "Soldiers"
    for(let i=0; i < Math.min(count, 15); i++) {
        let ang = (frame * 0.1) + (i * 0.8);
        let dist = size + 5 + (i * 0.5);
        ctx.beginPath();
        ctx.arc(x + Math.cos(ang) * dist, y + Math.sin(ang) * dist, 4, 0, Math.PI*2);
        ctx.fill();
    }
}

function loop() {
    ctx.fillStyle = '#050a10';
    ctx.fillRect(0, 0, w, h);
    
    if (running) {
        frame++;
        spawn();
        playerX += (targetX - playerX) * 0.15;
        
        objects.forEach((o, i) => {
            o.y += 6;
            // Draw Gate
            ctx.shadowBlur = 10;
            ctx.shadowColor = o.color;
            ctx.strokeStyle = o.color;
            ctx.lineWidth = 4;
            ctx.strokeRect(o.x, o.y, 150, 50);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(o.type + o.val, o.x + 75, o.y + 32);

            // Collision
            if (Math.abs(o.y - (h - 150)) < 10 && playerX > o.x && playerX < o.x + 150) {
                if (o.type === 'x') count *= o.val; else count += o.val;
                objects.splice(i, 1);
                counterEl.innerText = Math.floor(count);
            }
            if (o.y > h) objects.splice(i, 1);
        });

        drawPlayer(playerX, h - 150, count);
    }
    
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

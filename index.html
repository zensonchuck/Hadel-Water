<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanguard: Ultra HD Swarm</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #overlay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #00d2ff; text-align: center; pointer-events: none; }
        #count { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px #00d2ff; margin: 0; }
        #status { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading">INITIALIZING HIGH-END RENDERER...</div>
    <div id="overlay">
        <p id="status">Vanguard Army Size</p>
        <h1 id="count">1</h1>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ULTRA SETTINGS ---
        const SETTINGS = {
            bloom: true,
            shadows: true,
            maxUnits: 1500, // High-end hardware can handle this
            fov: 60,
            fogColor: 0x020205,
            gateFrequency: 1800
        };

        let scene, camera, renderer, world, clock;
        let units = [], gates = [];
        let soldierCount = 1;
        let targetX = 0, currentX = 0;

        async function init() {
            document.getElementById('loading').remove();
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(SETTINGS.fogColor);
            scene.fog = new THREE.FogExp2(SETTINGS.fogColor, 0.015);

            camera = new THREE.PerspectiveCamera(SETTINGS.fov, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 18);
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // High-End Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0x00d2ff, 1.5);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);

            // The Road (Infinite Grid)
            const roadGeo = new THREE.PlaneGeometry(14, 10000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            const grid = new THREE.GridHelper(10000, 500, 0x00d2ff, 0x222222);
            grid.position.y = 0.01;
            scene.add(grid);

            world = new THREE.Group();
            scene.add(world);

            clock = new THREE.Clock();
            
            spawnUnit(); // Initial unit
            animate();
        }

        const unitGeo = new THREE.CapsuleGeometry(0.18, 0.4, 4, 12);
        const unitMat = new THREE.MeshStandardMaterial({ 
            color: 0x00d2ff, 
            emissive: 0x0044ff, 
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });

        function spawnUnit() {
            if (units.length >= SETTINGS.maxUnits) return;
            const unit = new THREE.Mesh(unitGeo, unitMat);
            unit.castShadow = true;
            unit.userData = {
                angle: Math.random() * Math.PI * 2,
                radius: Math.random() * 2,
                speed: 0.05 + Math.random() * 0.1
            };
            scene.add(unit);
            units.push(unit);
        }

        function createGate() {
            const isMult = Math.random() > 0.4;
            const val = isMult ? Math.floor(Math.random() * 3) + 2 : Math.floor(Math.random() * 30) + 10;
            const color = isMult ? 0x00d2ff : 0x00ff88;

            const group = new THREE.Group();
            const frameGeo = new THREE.BoxGeometry(6, 4, 0.5);
            const frameMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.4,
                shininess: 100
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.y = 2;
            group.add(frame);

            group.position.set((Math.random() - 0.5) * 8, 0, -150);
            group.userData = { isMult, val, hit: false, color };
            
            world.add(group);
            gates.push(group);
        }

        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth - 0.5) * 12;
        });

        let lastGateTime = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Movement
            world.position.z += 0.4;
            currentX += (targetX - currentX) * 0.1;

            // Update Swarm Logic (Physics-based)
            units.forEach((u, i) => {
                const spacing = Math.sqrt(i) * 0.35;
                const tx = currentX + Math.cos(u.userData.angle + time) * spacing;
                const tz = Math.sin(u.userData.angle + time) * spacing;
                
                u.position.x += (tx - u.position.x) * 0.1;
                u.position.z += (-world.position.z + tz - u.position.z) * 0.1;
                u.position.y = 0.5 + Math.sin(time * 5 + i) * 0.1; // Gentle bobbing
            });

            // Gate Spawning & Collision
            if (time * 1000 - lastGateTime > SETTINGS.gateFrequency) {
                createGate();
                lastGateTime = time * 1000;
            }

            gates.forEach((g, i) => {
                const relZ = g.position.z + world.position.z;
                if (Math.abs(relZ) < 1 && Math.abs(g.position.x - currentX) < 3.5 && !g.userData.hit) {
                    g.userData.hit = true;
                    g.visible = false;
                    const prevCount = soldierCount;
                    soldierCount = g.userData.isMult ? soldierCount * g.userData.val : soldierCount + g.userData.val;
                    
                    const toAdd = Math.min(soldierCount - prevCount, 100); 
                    for(let n=0; n<toAdd; n++) spawnUnit();
                    
                    document.getElementById('count').innerText = Math.floor(soldierCount);
                }
                if (relZ > 20) {
                    world.remove(g);
                    gates.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

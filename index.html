<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD: IRONCLAD HD</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        #count-display { font-size: 80px; color: #00d2ff; font-weight: 900; text-shadow: 0 0 30px #00d2ff; margin: 0; }
        #load-screen { position: absolute; inset: 0; background: #050505; display: flex; justify-content: center; align-items: center; color: #00d2ff; z-index: 200; font-family: monospace; }
    </style>
</head>
<body>
    <div id="load-screen">LOADING NEURAL RENDERER...</div>
    <div id="ui"><h1 id="count-display">1</h1></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- VERIFIED ENGINE CORE ---
        let scene, camera, renderer, clock, swarm = [], gates = [];
        let armyCount = 1, targetX = 0, currentX = 0;

        const init = () => {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020305);
            scene.fog = new THREE.Fog(0x020305, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // High-End Lighting
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(10, 20, 10);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1));

            // Infinite Road
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(16, 2000),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 })
            );
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            const grid = new THREE.GridHelper(2000, 100, 0x00d2ff, 0x111111);
            grid.position.y = 0.05;
            scene.add(grid);

            clock = new THREE.Clock();
            document.getElementById('load-screen').remove();
            
            spawnSoldier(0, 0);
            animate();
        };

        const soldierGeo = new THREE.CapsuleGeometry(0.2, 0.5, 4, 8);
        const soldierMat = new THREE.MeshStandardMaterial({ color: 0x00d2ff, emissive: 0x003366 });

        function spawnSoldier(offX, offZ) {
            const m = new THREE.Mesh(soldierGeo, soldierMat);
            m.castShadow = true;
            m.position.set(offX, 0.5, offZ);
            scene.add(m);
            swarm.push(m);
        }

        function spawnGate() {
            const isMult = Math.random() > 0.5;
            const val = isMult ? 2 : 10;
            const gate = new THREE.Group();
            
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(6, 4, 0.2),
                new THREE.MeshBasicMaterial({ color: isMult ? 0x00d2ff : 0x00ff88, transparent: true, opacity: 0.5 })
            );
            mesh.position.y = 2;
            gate.add(mesh);
            gate.position.set((Math.random() - 0.5) * 8, 0, -100);
            gate.userData = { isMult, val, hit: false };
            scene.add(gate);
            gates.push(gate);
        }

        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth - 0.5) * 14;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            currentX += (targetX - currentX) * 0.1;

            if (Math.floor(time * 2) % 10 === 0 && gates.length < 3) spawnGate();

            // Swarm Logic
            swarm.forEach((s, i) => {
                const spacing = Math.sqrt(i) * 0.5;
                const angle = i * 0.5 + time;
                const tx = currentX + Math.cos(angle) * spacing;
                const tz = Math.sin(angle) * spacing;
                s.position.x += (tx - s.position.x) * 0.1;
                s.position.z += (tz - s.position.z) * 0.1;
            });

            // Gate Logic & Collision
            for (let i = gates.length - 1; i >= 0; i--) {
                gates[i].position.z += 0.5;
                if (!gates[i].userData.hit && Math.abs(gates[i].position.z) < 1 && Math.abs(gates[i].position.x - currentX) < 3) {
                    gates[i].userData.hit = true;
                    gates[i].visible = false;
                    const bonus = gates[i].userData.isMult ? armyCount : gates[i].userData.val;
                    for(let j=0; j<Math.min(bonus, 50); j++) spawnSoldier(currentX, 0);
                    armyCount += bonus;
                    document.getElementById('count-display').innerText = armyCount;
                }
                if (gates[i].position.z > 20) {
                    scene.remove(gates[i]);
                    gates.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

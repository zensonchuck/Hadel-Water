<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANGUARD: ULTIMATE SURGE PRO</title>
    <style>
        :root { --p-color: #00d2ff; --s-color: #00ff88; --bg: #020408; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; }
        #app { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }

        /* --- PROFESSIONAL HUD SYSTEM --- */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .top-bar { margin-top: 40px; perspective: 1000px; }
        .counter-card { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 15px 50px; 
            border-radius: 20px; 
            border: 2px solid var(--p-color); 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3), inset 0 0 15px rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(20px);
            transform: rotateX(10deg);
            text-align: center;
        }
        #army-val { font-size: 72px; font-weight: 900; color: #fff; margin: 0; text-shadow: 0 0 20px var(--p-color); }
        .label { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--p-color); opacity: 0.8; }

        /* --- GAME NOTIFICATIONS --- */
        #notif-container { position: absolute; top: 180px; width: 100%; text-align: center; }
        .notif { color: var(--s-color); font-weight: bold; font-size: 24px; animation: floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(-40px); } }

        /* --- START OVERLAY --- */
        #overlay { position: fixed; inset: 0; background: rgba(2, 4, 8, 0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s; }
        .title { font-size: 60px; font-weight: 900; color: #fff; letter-spacing: 10px; margin-bottom: 10px; }
        .subtitle { color: var(--p-color); letter-spacing: 5px; margin-bottom: 50px; }
        .start-btn { 
            pointer-events: auto; 
            background: transparent; 
            border: 2px solid var(--p-color); 
            color: #fff; 
            padding: 20px 60px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 5px;
            transition: all 0.3s;
        }
        .start-btn:hover { background: var(--p-color); color: #000; box-shadow: 0 0 50px var(--p-color); }
    </style>
</head>
<body>

<div id="app">
    <div id="overlay">
        <h1 class="title">VANGUARD</h1>
        <p class="subtitle">ULTRA-HD COMMANDER</p>
        <button class="start-btn" onclick="Game.Start()">ENGAGE MISSION</button>
    </div>

    <div id="hud">
        <div class="top-bar">
            <div class="counter-card">
                <p class="label">Unit Strength</p>
                <h1 id="army-val">1</h1>
            </div>
        </div>
        <div id="notif-container"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
/**
 * ============================================================
 * VANGUARD GAME ENGINE v5.0 (PROFESSIONAL ARCHITECTURE)
 * ============================================================
 * This script is organized into Modular Sub-Systems to handle
 * high-performance rendering on high-end hardware.
 */

const GameConfig = {
    MAX_UNITS: 15000,
    INITIAL_COUNT: 1,
    ROAD_WIDTH: 16,
    MOVE_SPEED: 0.95,
    SWARM_SMOOTHING: 0.12,
    GATE_SPAWN_Z: -250,
    GATE_INTERVAL: 1200, // ms
    COLOR_BLUE: 0x00d2ff,
    COLOR_GREEN: 0x00ff88,
};

// --- CORE ENGINE ---
const Game = {
    isInitialized: false,
    isRunning: false,
    clock: new THREE.Clock(),
    count: GameConfig.INITIAL_COUNT,
    targetX: 0,
    currentX: 0,

    async Init() {
        this.Renderer = new RendererSystem();
        this.World = new WorldSystem();
        this.Crowd = new CrowdSystem();
        this.UI = new UISystem();
        
        this.BindInput();
        this.isInitialized = true;
        this.Loop();
    },

    Start() {
        document.getElementById('overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('overlay').remove(), 500);
        this.isRunning = true;
    },

    BindInput() {
        const handleMove = (x) => {
            this.targetX = ((x / window.innerWidth) - 0.5) * GameConfig.ROAD_WIDTH;
        };
        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
        window.addEventListener('resize', () => this.Renderer.OnResize());
    },

    Loop() {
        const delta = this.clock.getDelta();
        const elapsed = this.clock.getElapsedTime();

        if (this.isRunning) {
            this.currentX += (this.targetX - this.currentX) * 0.15;
            this.World.Update(delta);
            this.Crowd.Update(this.currentX, elapsed);
            this.CheckCollisions();
        }

        this.Renderer.Render();
        requestAnimationFrame(() => this.Loop());
    },

    CheckCollisions() {
        const gates = this.World.gates;
        for (let i = gates.length - 1; i >= 0; i--) {
            const g = gates[i];
            const distZ = Math.abs(g.mesh.position.z);
            const distX = Math.abs(g.mesh.position.x - this.currentX);

            if (!g.hit && distZ < 2 && distX < 4) {
                g.hit = true;
                g.mesh.visible = false;
                const prev = this.count;
                if (g.isMult) this.count *= g.val;
                else this.count += g.val;

                this.Crowd.Sync(this.count);
                this.UI.UpdateCount(this.count);
                this.UI.Notify(g.isMult ? `x${g.val}` : `+${g.val}`);
            }
        }
    }
};

// --- RENDERER SUBSYSTEM ---
class RendererSystem {
    constructor() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x020408);
        this.scene.fog = new THREE.FogExp2(0x020408, 0.012);

        this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
        this.camera.position.set(0, 18, 32);
        this.camera.lookAt(0, 2, -10);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        document.getElementById('app').appendChild(this.renderer.domElement);

        const amb = new THREE.AmbientLight(0xffffff, 0.4);
        this.scene.add(amb);

        this.sun = new THREE.DirectionalLight(0xffffff, 1.8);
        this.sun.position.set(30, 100, 30);
        this.sun.castShadow = true;
        this.sun.shadow.mapSize.set(2048, 2048);
        this.scene.add(this.sun);
    }

    OnResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    Render() {
        this.renderer.render(this.scene, this.camera);
    }
}

// --- WORLD SUBSYSTEM ---
class WorldSystem {
    constructor() {
        this.gates = [];
        this.lastGateTime = 0;
        this.initEnvironment();
    }

    initEnvironment() {
        const roadGeo = new THREE.PlaneGeometry(GameConfig.ROAD_WIDTH, 5000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.receiveShadow = true;
        Game.Renderer.scene.add(road);

        const grid = new THREE.GridHelper(5000, 400, GameConfig.COLOR_BLUE, 0x0a0a0a);
        grid.position.y = 0.05;
        Game.Renderer.scene.add(grid);
    }

    SpawnGate() {
        const isMult = Math.random() > 0.4;
        const val = isMult ? Math.floor(Math.random()*3)+2 : Math.floor(Math.random()*30)+10;
        const color = isMult ? GameConfig.COLOR_BLUE : GameConfig.COLOR_GREEN;

        const gateMesh = new THREE.Mesh(
            new THREE.BoxGeometry(7, 5, 0.5),
            new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.5, emissive: color, emissiveIntensity: 1 })
        );
        gateMesh.position.set((Math.random()-0.5)*8, 2.5, GameConfig.GATE_SPAWN_Z);
        
        Game.Renderer.scene.add(gateMesh);
        this.gates.push({ mesh: gateMesh, isMult, val, hit: false });
    }

    Update(delta) {
        const now = Date.now();
        if (now - this.lastGateTime > GameConfig.GATE_INTERVAL) {
            this.SpawnGate();
            this.lastGateTime = now;
        }

        for (let i = this.gates.length - 1; i >= 0; i--) {
            this.gates[i].mesh.position.z += GameConfig.MOVE_SPEED * 60 * delta;
            if (this.gates[i].mesh.position.z > 50) {
                Game.Renderer.scene.remove(this.gates[i].mesh);
                this.gates.splice(i, 1);
            }
        }
    }
}

// --- CROWD SUBSYSTEM (INSTANCED) ---
class CrowdSystem {
    constructor() {
        this.army = [];
        this.dummy = new THREE.Object3D();
        
        const geo = new THREE.CapsuleGeometry(0.22, 0.5, 4, 10);
        const mat = new THREE.MeshStandardMaterial({ 
            color: GameConfig.COLOR_BLUE, 
            emissive: 0x0044ff, 
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });

        this.mesh = new THREE.InstancedMesh(geo, mat, GameConfig.MAX_UNITS);
        this.mesh.castShadow = true;
        Game.Renderer.scene.add(this.mesh);

        this.Sync(GameConfig.INITIAL_COUNT);
    }

    Sync(newTotal) {
        const diff = Math.min(newTotal, GameConfig.MAX_UNITS) - this.army.length;
        if (diff > 0) {
            for (let i = 0; i < diff; i++) {
                this.army.push({
                    pos: new THREE.Vector3(0, 0.5, 0),
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
    }

    Update(centerX, time) {
        const rowSize = Math.floor(Math.sqrt(this.army.length));
        this.army.forEach((unit, i) => {
            const spacing = 0.5;
            const tx = centerX + ((i % rowSize) - rowSize/2) * spacing;
            const tz = Math.floor(i / rowSize) * spacing;

            unit.pos.x += (tx - unit.pos.x) * 0.15;
            unit.pos.z += (tz - unit.pos.z) * 0.15;

            this.dummy.position.set(unit.pos.x, 0.6 + Math.sin(time*10 + i)*0.1, unit.pos.z);
            this.dummy.rotation.x = Math.sin(time*12 + i) * 0.2;
            this.dummy.updateMatrix();
            this.mesh.setMatrixAt(i, this.dummy.matrix);
        });
        this.mesh.instanceMatrix.needsUpdate = true;
        this.mesh.count = this.army.length;
    }
}

// --- UI SUBSYSTEM ---
class UISystem {
    UpdateCount(val) {
        document.getElementById('army-val').innerText = Math.floor(val);
    }
    Notify(text) {
        const n = document.createElement('div');
        n.className = 'notif';
        n.innerText = text;
        document.getElementById('notif-container').appendChild(n);
        setTimeout(() => n.remove(), 1000);
    }
}

// --- BOOT ---
window.onload = () => Game.Init();

</script>
</body>
</html>

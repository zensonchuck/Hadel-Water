<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TILE SURVIVE: PRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --red: #e74c3c; --bg: #0a0a0b; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Roboto', sans-serif; overflow: hidden; color: white; }
        #game-container { position: relative; border: 15px solid #1a1a1c; border-radius: 30px; box-shadow: 0 0 150px rgba(0,0,0,0.9); overflow: hidden; }
        canvas { background: #244d1f; display: block; image-rendering: auto; }

        /* --- HUD --- */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 40px; box-sizing: border-box; }
        .resource-stack { display: flex; flex-direction: column; gap: 20px; }
        .card { background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(12px); padding: 20px 30px; border-radius: 18px; border-left: 10px solid var(--gold); display: flex; align-items: center; width: fit-content; min-width: 260px; box-shadow: 12px 12px 25px rgba(0,0,0,0.7); }
        .card.energy { border-left-color: var(--blue); }
        .icon-glyph { font-size: 44px; margin-right: 25px; }
        .data-container { display: flex; flex-direction: column; }
        .data-label { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 700; letter-spacing: 2px; }
        .data-val { font-size: 38px; font-family: 'Bangers', cursive; letter-spacing: 3px; text-shadow: 3px 3px 0 #000; color: #fff; }

        #top-right-hud { position: absolute; top: 40px; right: 40px; text-align: right; }
        .status-header { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 4px; color: #fff; margin-bottom: 12px; display: block; }
        .hp-track { width: 400px; height: 40px; background: rgba(0,0,0,0.8); border-radius: 20px; border: 4px solid #111; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c, #ff7675); transition: width 0.4s; }

        #build-dock { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; }
        .build-trigger { pointer-events: auto; background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%); color: white; padding: 22px 50px; border-radius: 100px; border: none; font-family: 'Bangers'; font-size: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 0 #1e8449; }
        #announcement { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); font-family: 'Bangers'; font-size: 40px; color: var(--gold); opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div class="resource-stack">
            <div class="card">
                <div class="icon-glyph">🪵</div>
                <div class="data-container"><span class="data-label">Wood Resources</span><span class="data-val" id="res-wood">0</span></div>
            </div>
            <div class="card energy">
                <div class="icon-glyph">⚡</div>
                <div class="data-container"><span class="data-label">Reactor Output</span><span class="data-val" id="res-energy">450</span></div>
            </div>
        </div>
        <div id="top-right-hud">
            <span class="status-header">REACTOR INTEGRITY</span>
            <div class="hp-track"><div id="hp-bar"></div></div>
        </div>
        <div id="announcement">THEY DROP WOOD, GRAB IT!</div>
        <div id="build-dock">
            <button class="build-trigger" id="wall-cmd">CONSTRUCT DEFENSE (50 🪵)</button>
        </div>
    </div>
</div>

<script>
// --- PART 1: VISUAL PIPELINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1400; canvas.height = 900;

const DrawLib = {
    tree(x, y, scale) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, 15, 50, 20, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#3e2723"; ctx.fillRect(-12, -10, 24, 40);
        const layers = [{w: 55, h: -40, c: "#1b5e20"}, {w: 45, h: -75, c: "#2e7d32"}, {w: 30, h: -110, c: "#388e3c"}];
        layers.forEach(l => {
            ctx.fillStyle = l.c; ctx.beginPath(); ctx.moveTo(0, l.h - 30); ctx.lineTo(l.w, l.h + 20); ctx.lineTo(-l.w, l.h + 20); ctx.fill();
        });
        ctx.restore();
    },
    reactor(x, y, frame) {
        ctx.save(); ctx.translate(x, y);
        let glow = ctx.createRadialGradient(0, 30, 10, 0, 30, 160 + Math.sin(frame*0.1)*10);
        glow.addColorStop(0, "rgba(52, 152, 219, 0.4)"); glow.addColorStop(1, "rgba(52, 152, 219, 0)");
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 30, 180, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#b2bec3"; ctx.beginPath(); ctx.moveTo(-75, 100); ctx.lineTo(-55, -90); ctx.lineTo(55, -90); ctx.lineTo(75, 100); ctx.fill();
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(-66, 50, 132, 20);
        ctx.restore();
    },
    // Placeholder for overwritten drawCharacter in Part 7
    drawCharacter(x, y, type, anim, dir, state) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = type === 'player' ? "#2980b9" : "#c0392b";
        ctx.fillRect(-20, -40, 40, 40);
        ctx.restore();
    }
};

// --- PART 2: STATE & AI ---
const State = { wood: 185, energy: 450, reactorHP: 100, frame: 0, shake: 0, gameOver: false, buildMode: null };
const Entities = { trees: [], enemies: [], bullets: [], particles: [], drops: [], walls: [] };
const Player = { x: 700, y: 700, tx: 700, ty: 700, speed: 0.12, dir: 1, anim: 0, state: 0 };

function initGameWorld() {
    for (let i = 0; i < 150; i++) {
        Entities.trees.push({ x: Math.random() * 550, y: Math.random() * 900, scale: 0.8 + Math.random() * 0.4 });
        Entities.trees.push({ x: 1400 - (Math.random() * 550), y: Math.random() * 900, scale: 0.8 + Math.random() * 0.4 });
    }
}

function manageEnemyWaves() {
    if (State.frame % 60 === 0) {
        Entities.enemies.push({ x: 600 + Math.random() * 200, y: -50, hp: 2, speed: 1.5, anim: 0 });
    }
}

function updateState() {
    if (State.gameOver) return;
    State.frame++;
    Player.x += (Player.tx - Player.x) * Player.speed;
    Player.y += (Player.ty - Player.y) * Player.speed;
    manageEnemyWaves();
}

// --- PART 3: COMBAT & PHYSICS ---
function checkCollision(obj1, obj2, radius) {
    return Math.hypot(obj1.x - obj2.x, obj1.y - obj2.y) < radius;
}

function handleCombat() {
    for (let i = Entities.bullets.length - 1; i >= 0; i--) {
        const b = Entities.bullets[i]; b.x += b.vx; b.y += b.vy;
        for (let j = Entities.enemies.length - 1; j >= 0; j--) {
            const en = Entities.enemies[j];
            if (checkCollision(b, en, 35)) {
                en.hp--; Entities.bullets.splice(i, 1);
                createExplosion(en.x, en.y, "#3498db", 8);
                if (en.hp <= 0) { spawnResourceDrop(en.x, en.y); Entities.enemies.splice(j, 1); }
                break;
            }
        }
    }
}

function spawnResourceDrop(x, y) {
    Entities.drops.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: -10, gravity: 0.6, bounce: 0, groundY: y + 30 });
}

function updatePhysics() {
    Entities.drops.forEach((d, index) => {
        if (d.bounce < 2) { d.x += d.vx; d.y += d.vy; d.vy += d.gravity; if (d.y > d.groundY) { d.y = d.groundY; d.vy *= -0.5; d.bounce++; } }
        if (Math.hypot(Player.x - d.x, Player.y - d.y) < 120) {
            d.x += (Player.x - d.x) * 0.15; d.y += (Player.y - d.y) * 0.15;
            if (Math.hypot(Player.x - d.x, Player.y - d.y) < 30) { State.wood += 5; Entities.drops.splice(index, 1); }
        }
    });
    Entities.enemies.forEach(en => {
        let angle = Math.atan2(450 - en.y, 700 - en.x);
        en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;
        if (checkCollision(en, {x: 700, y: 450}, 80)) State.reactorHP -= 0.05;
    });
}

function createExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        Entities.particles.push({ x, y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 1.0, color, size: Math.random() * 5 + 2 });
    }
}

// --- PART 4 & 5: ECONOMY & RENDER ---
function placeStructure() {
    if (State.wood >= 50) {
        Entities.walls.push({ x: Player.tx, y: Player.ty, hp: 300, maxHp: 300 });
        State.wood -= 50; State.buildMode = null;
    }
}

function updateUI() {
    document.getElementById('res-wood').innerText = Math.floor(State.wood);
    document.getElementById('hp-bar').style.width = State.reactorHP + "%";
}

function renderGame() {
    ctx.fillStyle = "#244d1f"; ctx.fillRect(0, 0, 1400, 900);
    let scene = [
        ...Entities.trees.map(t => ({y: t.y, r: () => DrawLib.tree(t.x, t.y, t.scale)})),
        ...Entities.enemies.map(e => ({y: e.y, r: () => DrawLib.drawCharacter(e.x, e.y, 'enemy', e.anim, 1, 1)})),
        ...Entities.walls.map(w => ({y: w.y, r: () => { ctx.fillStyle="#5d4037"; ctx.fillRect(w.x-40, w.y-40, 80, 80); }})),
        {y: Player.y, r: () => DrawLib.drawCharacter(Player.x, Player.y, 'player', Player.anim, Player.dir, Player.state)},
        {y: 450, r: () => DrawLib.reactor(700, 450, State.frame)}
    ];
    scene.sort((a, b) => a.y - b.y).forEach(obj => obj.r());
    Entities.bullets.forEach(b => ctx.fillRect(b.x, b.y, 8, 8));
}

// --- PART 7, 8, 9: ADVANCED LOGIC ---
const ANIM_STATES = { IDLE: 0, RUN: 1 };
DrawLib.drawCharacter = function(x, y, type, anim, dir, state) {
    ctx.save(); ctx.translate(x, y); if (dir < 0) ctx.scale(-1, 1);
    ctx.fillStyle = type === 'player' ? "#2980b9" : "#c0392b";
    ctx.fillRect(-18, -35, 36, 45);
    ctx.fillStyle = "#f3e5ab"; ctx.beginPath(); ctx.arc(0, -40, 16, 0, Math.PI*2); ctx.fill();
    ctx.restore();
};

const Upgrades = {
    fireRate: 1, bulletDamage: 1,
    apply(type) { if (State.wood >= 200) { State.wood -= 200; this[type]++; } }
};

// --- CONTROLS & LOOP ---
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    Player.tx = (e.clientX - rect.left) * (1400 / rect.width);
    Player.ty = (e.clientY - rect.top) * (900 / rect.height);
});

canvas.addEventListener('mousedown', () => {
    if (State.buildMode) { placeStructure(); }
    else {
        const angle = Math.atan2(Player.ty - Player.y, Player.tx - Player.x);
        Entities.bullets.push({ x: Player.x, y: Player.y, vx: Math.cos(angle) * 15, vy: Math.sin(angle) * 15 });
    }
});

document.getElementById('wall-cmd').addEventListener('click', () => { State.buildMode = 'wall'; });

function gameLoop() {
    updateState(); handleCombat(); updatePhysics(); updateUI(); renderGame();
    requestAnimationFrame(gameLoop);
}

initGameWorld();
gameLoop();
</script>
</body>
</html>

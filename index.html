<!DOCTYPE html>
<html>
<head>
    <title>Tile Survive - Browser Edition</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { background: #2d5a27; border: 5px solid #333; cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>WOOD: <span id="wood">0</span></h1>
        <h3>REACTOR: <span id="health">100</span>%</h3>
        <p>Click to Shoot | Collect Wood | Protect the Center</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// Game State
let wood = 0;
let reactorHealth = 100;
let player = { x: 400, y: 300, size: 20 };
let enemies = [];
let bullets = [];
let resources = [];
let frame = 0;

// Input
let mouse = { x: 400, y: 300 };
window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

window.addEventListener('mousedown', () => {
    bullets.push({
        x: player.x,
        y: player.y,
        angle: Math.atan2(mouse.y - player.y, mouse.x - player.x),
        speed: 7
    });
});

function spawnEnemy() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if(side === 0) { x = Math.random() * canvas.width; y = -20; }
    else if(side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
    else { x = -20; y = Math.random() * canvas.height; }
    enemies.push({ x, y, speed: 1.2, health: 1 });
}

function update() {
    frame++;
    if (frame % 60 === 0) spawnEnemy(); // Spawn every second

    // Move Player (Smooth follow)
    player.x += (mouse.x - player.x) * 0.1;
    player.y += (mouse.y - player.y) * 0.1;

    // Update Bullets
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    // Update Enemies
    enemies.forEach((en, i) => {
        const dx = 400 - en.x; // Head to reactor (center)
        const dy = 300 - en.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        en.x += (dx/dist) * en.speed;
        en.y += (dy/dist) * en.speed;

        if(dist < 40) { // Touching reactor
            reactorHealth -= 0.1;
            enemies.splice(i, 1);
        }

        // Bullet Collision
        bullets.forEach((b, bi) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 20) {
                resources.push({ x: en.x, y: en.y }); // Drop wood
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
            }
        });
    });

    // Resource Collection
    resources.forEach((r, i) => {
        if(Math.hypot(player.x - r.x, player.y - r.y) < 30) {
            wood += 5;
            resources.splice(i, 1);
            document.getElementById('wood').innerText = wood;
        }
    });

    document.getElementById('health').innerText = Math.max(0, Math.floor(reactorHealth));
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Grid
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
    }

    // Draw Reactor
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(370, 270, 60, 60);
    ctx.strokeStyle = "white";
    ctx.strokeRect(370, 270, 60, 60);

    // Draw Resources (Wood)
    ctx.fillStyle = "#8B4513";
    resources.forEach(r => {
        ctx.beginPath(); ctx.arc(r.x, r.y, 8, 0, Math.PI*2); ctx.fill();
    });

    // Draw Enemies (Blue Guys)
    ctx.fillStyle = "#4a90e2";
    enemies.forEach(en => {
        ctx.beginPath(); ctx.arc(en.x, en.y, 12, 0, Math.PI*2); ctx.fill();
    });

    // Draw Bullets
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    });

    // Draw Player
    ctx.fillStyle = "#e67e22";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
}

function gameLoop() {
    update();
    draw();
    if(reactorHealth > 0) requestAnimationFrame(gameLoop);
    else alert("Game Over! The Reactor was destroyed.");
}

gameLoop();
</script>
</body>
</html>

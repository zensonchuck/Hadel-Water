<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OHM-BLOX: NCEA ESCAPE v2.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; font-family: monospace; }
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>PROJECT: OHM-BLOX v2.0</h1>
        <div id="stats">VOLTAGE: 230V | CURRENT: 2A | RESISTANCE: ???</div>
    </div>
    <div id="instructions">CLICK TO START | WASD to Move | SPACE to Jump</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Create Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Create Obstacles (Voltage Blocks)
        const blocks = [];
        for (let i = 0; i < 20; i++) {
            const block = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 3), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
            block.position.set(Math.random() * 20 - 10, i * 1.5, -i * 7);
            scene.add(block);
            blocks.push(block);
        }

        // The Goal (PS5)
        const ps5 = new THREE.Mesh(new THREE.BoxGeometry(4, 8, 2), new THREE.MeshPhongMaterial({ color: 0x0000ff }));
        ps5.position.set(0, 30, -150);
        scene.add(ps5);

        // Movement variables
        let keys = {};
        let velocityY = 0;
        let isJumping = false;

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousedown', () => document.body.requestPointerLock());

        camera.position.set(0, 2, 5);

        function animate() {
            requestAnimationFrame(animate);
            
            if (keys['KeyW']) camera.translateZ(-0.2);
            if (keys['KeyS']) camera.translateZ(0.2);
            if (keys['KeyA']) camera.translateX(-0.2);
            if (keys['KeyD']) camera.translateX(0.2);
            if (keys['Space'] && !isJumping) { velocityY = 0.3; isJumping = true; }

            // Gravity
            camera.position.y += velocityY;
            if (camera.position.y > 1.6) {
                velocityY -= 0.01;
            } else {
                camera.position.y = 1.6;
                velocityY = 0;
                isJumping = false;
            }

            // Fall Reset
            if (camera.position.y < -10) camera.position.set(0, 2, 5);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

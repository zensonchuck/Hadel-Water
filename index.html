<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard: Definitive Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; }
        #counter-container { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 10px 40px; border-radius: 50px; border: 3px solid #00d2ff; backdrop-filter: blur(10px); }
        #count { font-size: 60px; color: #fff; font-weight: 900; margin: 0; text-shadow: 0 0 20px #00d2ff; }
        #start-prompt { position: absolute; bottom: 20%; width: 100%; text-align: center; color: white; font-weight: bold; letter-spacing: 2px; animate: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="counter-container"><h1 id="count">1</h1></div>
        <div id="start-prompt">DRAG TO START MISSION</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- PROFESSIONAL ENGINE CONFIG ---
        const CONFIG = {
            maxSoldiers: 5000,
            roadWidth: 12,
            runSpeed: 0.5,
            gateInterval: 1.5, // seconds
            bloomColor: 0x00d2ff
        };

        let scene, camera, renderer, clock;
        let soldierMesh, dummy = new THREE.Object3D();
        let soldiers = [];
        let gates = [];
        let armySize = 1;
        let targetX = 0, currentX = 0;
        let isStarted = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050a15);
            scene.fog = new THREE.FogExp2(0x050a15, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25);
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Studio Lighting
            const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(hemi);
            const spot = new THREE.SpotLight(0x00d2ff, 2);
            spot.position.set(0, 50, 0);
            spot.castShadow = true;
            scene.add(spot);

            // Environment: Infinite Gridded Road
            const roadGeo = new THREE.PlaneGeometry(CONFIG.roadWidth, 2000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            const grid = new THREE.GridHelper(2000, 200, 0x00d2ff, 0x111111);
            grid.position.y = 0.02;
            scene.add(grid);

            // Instanced Soldier System (High-End Optimization)
            const soldierGeo = new THREE.CapsuleGeometry(0.2, 0.5, 4, 8);
            const soldierMat = new THREE.MeshStandardMaterial({ color: 0x00d2ff, emissive: 0x0055ff, emissiveIntensity: 0.5 });
            soldierMesh = new THREE.InstancedMesh(soldierGeo, soldierMat, CONFIG.maxSoldiers);
            soldierMesh.castShadow = true;
            scene.add(soldierMesh);

            clock = new THREE.Clock();
            
            // Initial Army
            for(let i=0; i<armySize; i++) addSoldier();
            
            animate();
        }

        function addSoldier() {
            if (soldiers.length >= CONFIG.maxSoldiers) return;
            soldiers.push({
                offset: new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2),
                phase: Math.random() * Math.PI * 2
            });
        }

        function spawnGate() {
            const isMult = Math.random() > 0.4;
            const val = isMult ? Math.floor(Math.random()*3)+2 : Math.floor(Math.random()*20)+5;
            const color = isMult ? 0x00d2ff : 0x00ff88;

            const gateGroup = new THREE.Group();
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(6, 5, 0.5),
                new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.4, emissive: color })
            );
            frame.position.y = 2.5;
            gateGroup.add(frame);

            gateGroup.position.set((Math.random()-0.5)*7, 0, -120);
            gateGroup.userData = { isMult, val, active: true };
            scene.add(gateGroup);
            gates.push(gateGroup);
        }

        window.addEventListener('pointermove', (e) => {
            isStarted = true;
            document.getElementById('start-prompt').style.display = 'none';
            targetX = ((e.clientX / window.innerWidth) - 0.5) * CONFIG.roadWidth;
        });

        let gateTimer = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (isStarted) {
                currentX += (targetX - currentX) * 0.15;
                gateTimer += delta;
                if (gateTimer > CONFIG.gateInterval) {
                    spawnGate();
                    gateTimer = 0;
                }
            }

            // Update Gates & Collisions
            for (let i = gates.length - 1; i >= 0; i--) {
                const g = gates[i];
                if (isStarted) g.position.z += 0.8;

                if (g.userData.active && Math.abs(g.position.z) < 1 && Math.abs(g.position.x - currentX) < 3.5) {
                    g.userData.active = false;
                    g.visible = false;
                    const amount = g.userData.isMult ? (armySize * g.userData.val) - armySize : g.userData.val;
                    for(let n=0; n < Math.min(amount, 100); n++) addSoldier();
                    armySize += amount;
                    document.getElementById('count').innerText = Math.floor(armySize);
                }

                if (g.position.z > 30) {
                    scene.remove(g);
                    gates.splice(i, 1);
                }
            }

            // Update Instanced Swarm
            soldiers.forEach((s, i) => {
                const spacing = Math.sqrt(i) * 0.45;
                const angle = i * 0.5 + time * 2;
                
                const goalX = currentX + Math.cos(angle) * spacing;
                const goalZ = Math.sin(angle) * spacing;
                
                s.offset.x += (goalX - s.offset.x) * 0.1;
                s.offset.z += (goalZ - s.offset.z) * 0.1;
                
                dummy.position.set(s.offset.x, 0.5 + Math.sin(time * 8 + i) * 0.1, s.offset.z);
                dummy.rotation.x = Math.sin(time * 10 + i) * 0.2; // Running tilt
                dummy.updateMatrix();
                soldierMesh.setMatrixAt(i, dummy.matrix);
            });
            soldierMesh.instanceMatrix.needsUpdate = true;
            soldierMesh.count = soldiers.length;

            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>

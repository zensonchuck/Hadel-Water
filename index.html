<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGUARD: SURGE MASTER</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        #counter-box { margin-top: 50px; background: rgba(0, 210, 255, 0.2); padding: 15px 50px; border-radius: 100px; border: 3px solid #00d2ff; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0, 210, 255, 0.5); }
        #army-count { font-size: 72px; color: #fff; font-weight: 900; margin: 0; text-shadow: 0 0 20px #00d2ff; }
        #instruction { position: absolute; bottom: 15%; color: rgba(255,255,255,0.7); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.3; transform: scale(1); } }
        #loading-screen { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; justify-content: center; align-items: center; color: #00d2ff; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-screen">INITIALIZING ULTIMATE RENDERER...</div>

    <div id="ui-layer">
        <div id="counter-box"><h1 id="army-count">1</h1></div>
        <div id="instruction">DRAG TO LEAD YOUR ARMY</div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        /** * VANGUARD ENGINE - DEFINITIVE PC BUILD
         * Optimized for High-End GPU Performance
         */

        let scene, camera, renderer, clock;
        let instancedSoldiers, dummy = new THREE.Object3D();
        let army = [];
        let gates = [];
        let count = 1;
        let isMoving = false;
        let targetX = 0, lerpX = 0;
        
        const MAX_UNITS = 10000; // PC high-end limit
        const ROAD_WIDTH = 14;

        // Initialize Engine
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020408);
            scene.fog = new THREE.FogExp2(0x020408, 0.015);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 18, 30);
            camera.lookAt(0, 2, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Studio Lighting Setup
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0x00d2ff, 1.8);
            sun.position.set(20, 50, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 4096; // Ultra-HD shadows
            sun.shadow.mapSize.height = 4096;
            scene.add(sun);

            // Infinite Floor Logic
            const floorGeo = new THREE.PlaneGeometry(ROAD_WIDTH, 5000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1, metalness: 0.3 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const grid = new THREE.GridHelper(5000, 400, 0x00d2ff, 0x111111);
            grid.position.y = 0.05;
            scene.add(grid);

            // Soldier System
            const soldierGeo = new THREE.CapsuleGeometry(0.22, 0.5, 4, 10);
            const soldierMat = new THREE.MeshStandardMaterial({ 
                color: 0x00d2ff, 
                emissive: 0x0066ff, 
                emissiveIntensity: 0.6,
                roughness: 0.1,
                metalness: 0.8
            });
            instancedSoldiers = new THREE.InstancedMesh(soldierGeo, soldierMat, MAX_UNITS);
            instancedSoldiers.castShadow = true;
            scene.add(instancedSoldiers);

            clock = new THREE.Clock();
            
            // Start with 1 soldier
            for(let i=0; i<count; i++) spawnUnit();

            // Hide Loader
            document.getElementById('loading-screen').style.display = 'none';

            window.addEventListener('pointermove', handleMove);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        function spawnUnit() {
            if (army.length >= MAX_UNITS) return;
            army.push({
                x: (Math.random()-0.5) * 2,
                z: (Math.random()-0.5) * 2,
                v: Math.random() * 0.2, // Individual variance
                id: army.length
            });
        }

        function spawnGate() {
            const isMult = Math.random() > 0.4;
            const val = isMult ? Math.floor(Math.random()*3)+2 : Math.floor(Math.random()*25)+10;
            const color = isMult ? 0x00d2ff : 0x00ff88;

            const group = new THREE.Group();
            const gateMesh = new THREE.Mesh(
                new THREE.BoxGeometry(7, 5, 0.4),
                new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.5, emissive: color, emissiveIntensity: 2 })
            );
            gateMesh.position.y = 2.5;
            group.add(gateMesh);
            
            group.position.set((Math.random()-0.5) * 8, 0, -150);
            group.userData = { isMult, val, active: true };
            scene.add(group);
            gates.push(group);
        }

        function handleMove(e) {
            isMoving = true;
            document.getElementById('instruction').style.display = 'none';
            targetX = ((e.clientX / window.innerWidth) - 0.5) * ROAD_WIDTH;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let gateTimer = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (isMoving) {
                lerpX += (targetX - lerpX) * 0.12;
                gateTimer += delta;
                if (gateTimer > 1.4) {
                    spawnGate();
                    gateTimer = 0;
                }
            }

            // Move & Collide Gates
            for (let i = gates.length - 1; i >= 0; i--) {
                const g = gates[i];
                if (isMoving) g.position.z += 0.8;

                if (g.userData.active && Math.abs(g.position.z) < 1.5 && Math.abs(g.position.x - lerpX) < 4) {
                    g.userData.active = false;
                    g.visible = false;
                    const addAmount = g.userData.isMult ? (count * g.userData.val) - count : g.userData.val;
                    for(let n=0; n<Math.min(addAmount, 200); n++) spawnUnit();
                    count += addAmount;
                    document.getElementById('army-count').innerText = Math.floor(count);
                }

                if (g.position.z > 50) {
                    scene.remove(g);
                    gates.splice(i, 1);
                }
            }

            // Swarm Simulation
            army.forEach((unit, i) => {
                const rowSize = Math.floor(Math.sqrt(army.length));
                const spacing = 0.55;
                
                const goalX = lerpX + ((i % rowSize) - rowSize/2) * spacing;
                const goalZ = Math.floor(i / rowSize) * spacing;

                unit.x += (goalX - unit.x) * 0.1;
                unit.z += (goalZ - unit.z) * 0.1;

                dummy.position.set(unit.x, 0.5 + Math.sin(time*10 + i)*0.1, unit.z);
                dummy.rotation.x = Math.sin(time*12 + i) * 0.2; // Run lean
                dummy.updateMatrix();
                instancedSoldiers.setMatrixAt(i, dummy.matrix);
            });
            
            instancedSoldiers.instanceMatrix.needsUpdate = true;
            instancedSoldiers.count = Math.min(army.length, MAX_UNITS);

            renderer.render(scene, camera);
        }

        // Force initialize
        window.onload = init;
    </script>
</body>
</html>

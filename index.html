<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TILE SURVIVE: ULTIMATE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Roboto', sans-serif; overflow: hidden; color: white; }
        #game-wrapper { position: relative; border: 10px solid #222; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,1); cursor: crosshair; }
        canvas { background: #2d5a27; display: block; image-rendering: auto; }
        
        /* UI OVERLAY */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 30px; box-sizing: border-box; }
        .stat-card { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border-left: 6px solid #f1c40f; margin-bottom: 15px; display: flex; align-items: center; width: fit-content; min-width: 200px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .icon { font-size: 32px; margin-right: 15px; }
        .val { font-size: 28px; color: #fff; font-family: 'Bangers', cursive; letter-spacing: 2px; }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; display: block; }
        
        #health-container { position: absolute; top: 30px; right: 30px; text-align: right; }
        .hp-bar { width: 300px; height: 30px; background: #333; border-radius: 15px; border: 3px solid #000; overflow: hidden; position: relative; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(to right, #e74c3c, #ff7675); transition: width 0.2s; }
        
        #build-menu { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .build-btn { pointer-events: auto; background: #2ecc71; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-family: 'Bangers'; font-size: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #27ae60; }
        .build-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #27ae60; }
        .build-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="stat-card">
            <span class="icon">🪵</span>
            <div><span class="label">Inventory</span><span class="val" id="wood-ui">0</span></div>
        </div>
        <div class="stat-card" style="border-left-color: #3498db;">
            <span class="icon">⚡</span>
            <div><span class="label">Energy</span><span class="val">450</span></div>
        </div>

        <div id="health-container">
            <span class="label" style="margin-bottom: 5px;">Reactor Integrity</span>
            <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>

        <div id="build-menu">
            <button class="build-btn" onclick="setBuildMode('wall')">BUILD WALL (50 Wood)</button>
        </div>
    </div>
</div>

<script>
/** * TILE SURVIVE: PRO ENGINE v1.0 
 * Procedural Art, Y-Sorting, Vector Physics, Dynamic Lighting
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1200;
canvas.height = 800;

// --- CORE CONFIG ---
const CONFIG = {
    WOOD_COST_WALL: 50,
    ENEMY_SPAWN_RATE: 120, // Frames
    REACTOR_X: 600,
    REACTOR_Y: 450,
    GRID_SIZE: 80
};

let state = {
    wood: 150,
    hp: 100,
    frame: 0,
    shake: 0,
    buildMode: null,
    gameOver: false
};

// --- ENTITY POOLS ---
let trees = [];
let enemies = [];
let bullets = [];
let particles = [];
let drops = [];
let buildings = [];

const player = {
    x: 600, y: 550,
    tx: 600, ty: 550,
    w: 40, h: 40,
    angle: 0,
    anim: 0
};

// --- PROCEDURAL ART GENERATORS ---
function drawTree(ctx, x, y) {
    ctx.save();
    ctx.translate(x, y);
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, 5, 40, 15, 0, 0, Math.PI*2); ctx.fill();
    // Trunk
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(-8, -10, 16, 20);
    // Leaves (3 Tiers)
    ctx.fillStyle = "#2d5a27";
    for(let i=0; i<3; i++) {
        ctx.beginPath();
        ctx.moveTo(0, -80 + (i*20));
        ctx.lineTo(35 - (i*5), -20 + (i*20));
        ctx.lineTo(-35 + (i*5), -20 + (i*20));
        ctx.fill();
    }
    ctx.restore();
}

function drawReactor(ctx, x, y) {
    ctx.save();
    ctx.translate(x, y);
    // Glow
    let pulse = Math.sin(state.frame * 0.1) * 10;
    let grd = ctx.createRadialGradient(0, 0, 10, 0, 0, 100 + pulse);
    grd.addColorStop(0, "rgba(52, 152, 219, 0.4)");
    grd.addColorStop(1, "rgba(52, 152, 219, 0)");
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, 150, 0, Math.PI*2); ctx.fill();

    // Tower Body
    ctx.fillStyle = "#dfe6e9";
    ctx.beginPath();
    ctx.moveTo(-50, 60); ctx.lineTo(-40, -60);
    ctx.quadraticCurveTo(0, -75, 40, -60);
    ctx.lineTo(50, 60); ctx.fill();

    // Tower Rings
    ctx.strokeStyle = "#b2bec3"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-45, 20); ctx.lineTo(45, 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-42, -20); ctx.lineTo(42, -20); ctx.stroke();

    // Lightning Bolt Icon
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath();
    ctx.moveTo(-10, -10); ctx.lineTo(10, -30); ctx.lineTo(5, -10); ctx.lineTo(15, 10); ctx.lineTo(-5, 30); ctx.lineTo(0, 10); ctx.fill();
    
    // Top Rim
    ctx.fillStyle = "#2d3436";
    ctx.beginPath(); ctx.ellipse(0, -65, 42, 12, 0, 0, Math.PI*2); ctx.fill();
    // Inner Glow
    ctx.fillStyle = "#74b9ff";
    ctx.beginPath(); ctx.ellipse(0, -65, 30, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawPlayer(ctx, x, y, anim) {
    ctx.save();
    ctx.translate(x, y + Math.sin(anim)*5);
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, 20, 25, 10, 0, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = "#e67e22"; // Orange shirt
    ctx.fillRect(-15, -20, 30, 35);
    // Head
    ctx.fillStyle = "#ffdbac";
    ctx.beginPath(); ctx.arc(0, -25, 12, 0, Math.PI*2); ctx.fill();
    // Tool (Gun/Axe)
    ctx.fillStyle = "#2c3e50";
    ctx.fillRect(10, -10, 25, 8);
    ctx.restore();
}

function drawEnemy(ctx, x, y, frame) {
    ctx.save();
    ctx.translate(x, y + Math.sin(frame*0.2)*3);
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(0, 15, 15, 5, 0, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = "#3498db";
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
    // Eyes (Animated)
    ctx.fillStyle = "white";
    let eyeSize = Math.sin(frame*0.1) > 0.9 ? 1 : 4;
    ctx.fillRect(-8, -4, eyeSize, 4); ctx.fillRect(4, -4, eyeSize, 4);
    ctx.restore();
}

// --- INITIALIZATION ---
function init() {
    // Generate Dense Forest Boundary
    for(let i=0; i<60; i++) {
        let side = Math.random() > 0.5;
        trees.push({
            x: side ? Math.random()*300 : canvas.width - Math.random()*300,
            y: Math.random() * canvas.height,
            type: 'tree'
        });
    }
    // Top boundary
    for(let i=0; i<20; i++) {
        trees.push({ x: Math.random()*canvas.width, y: Math.random()*200, type: 'tree' });
    }
}

// --- GAME LOGIC ---
function spawnParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 1.0, color, size: Math.random()*5+2
        });
    }
}

function setBuildMode(mode) {
    if(state.wood >= CONFIG.WOOD_COST_WALL) {
        state.buildMode = mode;
    }
}

canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    player.tx = e.clientX - r.left;
    player.ty = e.clientY - r.top;
});

canvas.addEventListener('mousedown', e => {
    if(state.buildMode === 'wall') {
        buildings.push({ x: player.tx, y: player.ty, hp: 200, type: 'wall' });
        state.wood -= CONFIG.WOOD_COST_WALL;
        state.buildMode = null;
        spawnParticles(player.tx, player.ty, "#8B4513", 15);
        return;
    }
    
    // Shoot
    let ang = Math.atan2(player.ty - player.y, player.tx - player.x);
    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(ang) * 12, vy: Math.sin(ang) * 12
    });
});

function update() {
    if(state.gameOver) return;
    state.frame++;
    
    // Player Move
    let dx = player.tx - player.x;
    let dy = player.ty - player.y;
    player.x += dx * 0.1;
    player.y += dy * 0.1;
    if(Math.hypot(dx, dy) > 5) player.anim += 0.2;

    // Enemy Spawn
    if(state.frame % CONFIG.ENEMY_SPAWN_RATE === 0) {
        let ang = Math.random() * Math.PI * 2;
        enemies.push({
            x: CONFIG.REACTOR_X + Math.cos(ang) * 800,
            y: CONFIG.REACTOR_Y + Math.sin(ang) * 800,
            hp: 2, speed: 1.2 + (state.frame/5000)
        });
    }

    // Bullet Logic
    bullets.forEach((b, bi) => {
        b.x += b.vx; b.y += b.vy;
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(bi, 1);
        
        enemies.forEach((en, ei) => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 25) {
                en.hp--;
                bullets.splice(bi, 1);
                spawnParticles(en.x, en.y, "#3498db", 5);
                if(en.hp <= 0) {
                    enemies.splice(ei, 1);
                    drops.push({ x: en.x, y: en.y, vx: (Math.random()-0.5)*5, vy: -5, grav: 0.5, ground: en.y + 20 });
                }
            }
        });
    });

    // Enemy AI
    enemies.forEach((en, ei) => {
        // Target priority: Walls then Reactor
        let target = { x: CONFIG.REACTOR_X, y: CONFIG.REACTOR_Y };
        buildings.forEach(b => {
            if(Math.hypot(en.x - b.x, en.y - b.y) < 150) target = b;
        });

        let ang = Math.atan2(target.y - en.y, target.x - en.x);
        en.x += Math.cos(ang) * en.speed;
        en.y += Math.sin(ang) * en.speed;

        // Damage Buildings
        buildings.forEach((b, bi) => {
            if(Math.hypot(en.x - b.x, en.y - b.y) < 40) {
                b.hp -= 0.5;
                if(b.hp <= 0) buildings.splice(bi, 1);
            }
        });

        // Damage Reactor
        if(Math.hypot(en.x - CONFIG.REACTOR_X, en.y - CONFIG.REACTOR_Y) < 60) {
            state.hp -= 0.1;
            state.shake = 10;
            if(state.hp <= 0) state.gameOver = true;
        }
    });

    // Drops & Collection
    drops.forEach((d, di) => {
        d.x += d.vx; d.y += d.vy;
        if(d.y < d.ground) d.vy += d.grav; else { d.vy = 0; d.vx = 0; }
        
        if(Math.hypot(player.x - d.x, player.y - d.y) < 40) {
            state.wood += 5;
            drops.splice(di, 1);
        }
    });

    // Particles
    particles.forEach((p, pi) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(pi, 1);
    });

    // Shake decay
    state.shake *= 0.9;
    
    // UI
    document.getElementById('wood-ui').innerText = state.wood;
    document.getElementById('hp-fill').style.width = state.hp + '%';
}

function draw() {
    ctx.save();
    if(state.shake > 1) ctx.translate(Math.random()*state.shake, Math.random()*state.shake);

    // Ground
    ctx.fillStyle = "#2d5a27"; ctx.fillRect(0,0, canvas.width, canvas.height);
    
    // Grid Lines
    ctx.strokeStyle = "rgba(0,0,0,0.05)";
    for(let i=0; i<canvas.width; i+=CONFIG.GRID_SIZE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=CONFIG.GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

    // Y-SORTING ENGINE
    let world = [
        ...trees,
        ...enemies.map(e => ({...e, type:'enemy'})),
        ...buildings.map(b => ({...b, type:'building'})),
        ...drops.map(d => ({...d, type:'drop'})),
        { x: player.x, y: player.y, type: 'player' },
        { x: CONFIG.REACTOR_X, y: CONFIG.REACTOR_Y, type: 'reactor' }
    ];
    world.sort((a, b) => a.y - b.y);

    world.forEach(obj => {
        if(obj.type === 'tree') drawTree(ctx, obj.x, obj.y);
        if(obj.type === 'reactor') drawReactor(ctx, obj.x, obj.y);
        if(obj.type === 'player') drawPlayer(ctx, obj.x, obj.y, player.anim);
        if(obj.type === 'enemy') drawEnemy(ctx, obj.x, obj.y, state.frame);
        if(obj.type === 'building') {
            ctx.fillStyle = "#8B4513"; ctx.fillRect(obj.x-30, obj.y-30, 60, 60);
            ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 4; ctx.strokeRect(obj.x-30, obj.y-30, 60, 60);
        }
        if(obj.type === 'drop') {
            ctx.fillStyle = "#d2b48c"; ctx.beginPath(); ctx.arc(obj.x, obj.y, 8, 0, Math.PI*2); ctx.fill();
        }
    });

    // FX
    ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x-4, b.y-4, 8, 8));
    particles.forEach(p => {
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Build Ghost
    if(state.buildMode === 'wall') {
        ctx.fillStyle = "rgba(46, 204, 113, 0.3)";
        ctx.fillRect(player.tx-30, player.ty-30, 60, 60);
    }

    ctx.restore();

    if(state.gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "80px Bangers"; ctx.textAlign = "center";
        ctx.fillText("BASE OVERRUN!", canvas.width/2, canvas.height/2);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>

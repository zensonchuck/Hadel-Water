<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OHM-BLOX v3.1: SAFE SPAWN EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 15px; border: 2px solid #0f0; background: rgba(0,20,0,0.9); }
        #instructions { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f0; color: #000; padding: 10px 20px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div style="font-size: 20px; font-weight: bold;">SYSTEM: OHM-BLOX v3.1</div>
        <div id="status">ZONE: SAFE_SPAWN_LOBBY</div>
        <div id="coords">X:0 Y:0 Z:0</div>
        <div id="progress-bar" style="width: 200px; height: 10; border: 1px solid #0f0; margin-top: 5px;"><div id="fill" style="background:#0f0; height:100%; width:0%;"></div></div>
    </div>
    <div id="instructions">CLICK TO BEGIN | SPACE TO JUMP</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE CONFIG ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000500);
        scene.fog = new THREE.FogExp2(0x000500, 0.01);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x00ff00, 0.3));
        const pLight = new THREE.PointLight(0x00ff00, 2, 30);
        scene.add(pLight);

        // --- PLATFORM SYSTEM ---
        const platforms = [];
        
        // 1. HUGE SAFE SPAWN PLATFORM (100x100)
        const spawnGeo = new THREE.BoxGeometry(100, 2, 100);
        const spawnMat = new THREE.MeshPhongMaterial({ color: 0x111111, emissive: 0x002200 });
        const spawnPlatform = new THREE.Mesh(spawnGeo, spawnMat);
        spawnPlatform.position.set(0, -1, 0); // Positioned at origin
        scene.add(spawnPlatform);
        platforms.push(spawnPlatform);

        // Add a grid helper to the spawn area so you can see movement
        const grid = new THREE.GridHelper(100, 20, 0x00ff00, 0x004400);
        grid.position.y = 0.01;
        scene.add(grid);

        // 2. PROCEDURAL OBSTACLE COURSE
        let lastZ = -60;
        for (let i = 0; i < 40; i++) {
            const bGeo = new THREE.BoxGeometry(5, 1, 5);
            const bMat = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x003300 });
            const b = new THREE.Mesh(bGeo, bMat);
            b.position.set(Math.random() * 20 - 10, i * 2, lastZ);
            scene.add(b);
            platforms.push(b);
            lastZ -= 10;
        }

        // --- PLAYER LOGIC ---
        let player = {
            pos: new THREE.Vector3(0, 10, 0), // Start HIGH above the platform to ensure landing
            vel: new THREE.Vector3(),
            rot: new THREE.Euler(0, 0, 0, 'YXZ'),
            grounded: false
        };

        const keys = { w:false, a:false, s:false, d:false, space:false };
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyA') keys.a = true; if(e.code === 'KeyD') keys.d = true;
            if(e.code === 'Space') keys.space = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyA') keys.a = false; if(e.code === 'KeyD') keys.d = false;
            if(e.code === 'Space') keys.space = false;
        });

        document.addEventListener('mousedown', () => {
            document.body.requestPointerLock();
            document.getElementById('instructions').style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                player.rot.y -= e.movementX * 0.002;
                player.rot.x = Math.max(-1.5, Math.min(1.5, player.rot.x - e.movementY * 0.002));
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Movement math
            const forward = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0, player.rot.y, 0));
            const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0, player.rot.y, 0));
            
            if(keys.w) player.vel.add(forward.multiplyScalar(0.01));
            if(keys.s) player.vel.add(forward.multiplyScalar(-0.01));
            if(keys.a) player.vel.add(right.multiplyScalar(-0.01));
            if(keys.d) player.vel.add(right.multiplyScalar(0.01));

            player.vel.x *= 0.9; player.vel.z *= 0.9; // Friction
            player.vel.y -= 0.01; // Gravity
            
            if(keys.space && player.grounded) { player.vel.y = 0.2; player.grounded = false; }

            player.pos.add(player.vel);

            // COLLISION
            player.grounded = false;
            for(let p of platforms) {
                const box = new THREE.Box3().setFromObject(p);
                if(box.containsPoint(new THREE.Vector3(player.pos.x, player.pos.y - 1.5, player.pos.z))) {
                    if(player.vel.y < 0) {
                        player.pos.y = box.max.y + 1.5;
                        player.vel.y = 0;
                        player.grounded = true;
                    }
                }
            }

            // Fall Reset
            if(player.pos.y < -30) { player.pos.set(0, 10, 0); player.vel.set(0,0,0); }

            camera.position.copy(player.pos);
            camera.rotation.copy(player.rot);
            pLight.position.copy(player.pos);
            
            document.getElementById('coords').innerText = `X:${player.pos.x.toFixed(0)} Y:${player.pos.y.toFixed(0)} Z:${player.pos.z.toFixed(0)}`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanguard: Crowd Surge 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px; }
        #counter { font-size: 48px; color: #fff; font-weight: bold; text-shadow: 0 0 10px rgba(0,180,255,0.8); background: rgba(0,0,0,0.3); padding: 10px 30px; border-radius: 50px; border: 2px solid #00b4ff; }
        #instructions { color: rgba(255,255,255,0.6); margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="counter">1</div>
        <div id="instructions">Slide to Lead the Swarm</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME CONFIGURATION ---
        const CONFIG = {
            laneWidth: 10,
            forwardSpeed: 0.2,
            playerSideSpeed: 0.15,
            gateSpawnInterval: 2000,
            maxCrowdSize: 500 // Optimization limit
        };

        // --- ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- GAME OBJECTS ---
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // Road/Environment
        const roadGeo = new THREE.PlaneGeometry(CONFIG.laneWidth, 2000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.receiveShadow = true;
        worldGroup.add(road);

        // Grid for "Speed" effect
        const grid = new THREE.GridHelper(2000, 100, 0x00b4ff, 0x222222);
        grid.position.y = 0.05;
        worldGroup.add(grid);

        // --- PLAYER & CROWD LOGIC ---
        let soldierCount = 1;
        const soldiers = [];
        const playerState = { x: 0, targetX: 0 };

        const soldierGeo = new THREE.CapsuleGeometry(0.15, 0.3, 4, 8);
        const soldierMat = new THREE.MeshStandardMaterial({ color: 0x0066ff });

        function updateCrowd(newCount) {
            const diff = Math.floor(newCount) - soldiers.length;
            if (diff > 0) {
                for (let i = 0; i < diff; i++) {
                    if (soldiers.length >= CONFIG.maxCrowdSize) break;
                    const s = new THREE.Mesh(soldierGeo, soldierMat);
                    s.castShadow = true;
                    s.position.set(
                        (Math.random() - 0.5) * 1.5, 
                        0.25, 
                        (Math.random() - 0.5) * 1.5
                    );
                    worldGroup.add(s);
                    soldiers.push(s);
                }
            }
            soldierCount = Math.max(1, Math.floor(newCount));
            document.getElementById('counter').innerText = soldierCount;
        }

        updateCrowd(1); // Start with 1

        // --- GATES ---
        const gates = [];
        function spawnGate() {
            const isMult = Math.random() > 0.5;
            const val = isMult ? Math.floor(Math.random() * 3) + 2 : Math.floor(Math.random() * 20) + 5;
            
            const gateG = new THREE.Group();
            const frameGeo = new THREE.BoxGeometry(4, 3, 0.5);
            const frameMat = new THREE.MeshStandardMaterial({ 
                color: isMult ? 0x00b4ff : 0x00ff88, 
                transparent: true, 
                opacity: 0.6 
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.y = 1.5;
            gateG.add(frame);
            
            gateG.position.set((Math.random() - 0.5) * 6, 0, -100);
            gateG.userData = { isMult, val, hit: false };
            
            worldGroup.add(gateG);
            gates.push(gateG);
        }

        // --- INPUTS ---
        window.addEventListener('mousemove', (e) => {
            playerState.targetX = (e.clientX / window.innerWidth - 0.5) * CONFIG.laneWidth;
        });

        // --- MAIN GAME LOOP ---
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, -5);

        let lastSpawn = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            // Forward Movement
            worldGroup.position.z += CONFIG.forwardSpeed;

            // Lateral Movement (Smoothing)
            playerState.x += (playerState.targetX - playerState.x) * CONFIG.playerSideSpeed;

            // Update Soldiers Position (Swarm behavior)
            soldiers.forEach((s, i) => {
                const angle = (i / soldiers.length) * Math.PI * 2;
                const radius = Math.sqrt(i) * 0.25;
                const swarmX = Math.cos(angle) * radius;
                const swarmZ = Math.sin(angle) * radius;
                
                s.position.x += (playerState.x + swarmX - s.position.x) * 0.1;
                s.position.z = -worldGroup.position.z + swarmZ;
            });

            // Gate Logic
            if (time - lastSpawn > CONFIG.gateSpawnInterval) {
                spawnGate();
                lastSpawn = time;
            }

            for (let i = gates.length - 1; i >= 0; i--) {
                const g = gates[i];
                // Check Collision
                const distZ = Math.abs(g.position.z + worldGroup.position.z);
                const distX = Math.abs(g.position.x - playerState.x);

                if (distZ < 0.5 && distX < 2 && !g.userData.hit) {
                    g.userData.hit = true;
                    const nextCount = g.userData.isMult ? soldierCount * g.userData.val : soldierCount + g.userData.val;
                    updateCrowd(nextCount);
                    g.visible = false;
                }

                if (g.position.z + worldGroup.position.z > 10) {
                    worldGroup.remove(g);
                    gates.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate(0);

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
